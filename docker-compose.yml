services:
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog
    ports:
      - "3307:3306"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
      - blog-mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: blog-redis
    ports:
      - "6379:6379"

  backend1:
    build: ./blog-server
    container_name: blog-backend-1
    environment:
      - SPRING_PROFILES_ACTIVE=druid,docker
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  backend2:
    build: ./blog-server
    container_name: blog-backend-2
    environment:
      - SPRING_PROFILES_ACTIVE=druid,docker
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: blog-nginx
    ports:
      - "80:80"
    volumes:
      - ./blog-web/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend1
      - backend2
    restart: unless-stopped

volumes:
  blog-mysql-data:
