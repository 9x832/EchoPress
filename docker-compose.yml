services:
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog
    ports:
      - "3307:3306"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
      - blog-mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: blog-redis
    ports:
      - "6379:6379"

volumes:
  blog-mysql-data:
